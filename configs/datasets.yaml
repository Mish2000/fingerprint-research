version: 1
schema_version: v2_dataset_registry
schemas:
  manifest_csv:
    required_columns:
    - dataset
    - capture
    - subject_id
    - impression
    - ppi
    - frgp
    - path
    optional_columns:
    - split
    schema_version: v1_manifest_csv
  pairs_csv:
    required_columns:
    - pair_id
    - label
    - split
    - subject_a
    - subject_b
    - frgp
    - path_a
    - path_b
    schema_version: v2_canonical_pair_csv
  sanity_outputs:
    typical_files:
    - split.json
    - stats.json
    - pairs_pos.csv
    - pairs_neg.csv
    - pairs_train.csv
    - pairs_val.csv
    - pairs_test.csv
    - pairs_split_build.meta.json
    - sanity_report.json
    - pairs/pairs_train.csv
    - pairs/pairs_val.csv
    - pairs/pairs_test.csv
    - pairs/split_subjects.json
  pairs_split_subjects_json:
    schema_version: v2_split_subjects
    required_fields:
    - schema_version
    - seed
    - neg_per_pos
    - impostors_per_pos
    - same_finger_policy
    - negative_pair_policy
    - positive_pair_policy
    - finger_col
    - pair_schema_version
    - pair_columns
    - splits
    canonical_pair_schema_version: v2_canonical_pair_csv
  pairs_split_build_meta_json:
    schema_version: v2_canonical_pair_bundle
    required_fields:
    - dataset
    - seed
    - neg_per_pos
    - impostors_per_pos
    - finger_col
    - positive_pair_policy
    - negative_pair_policy
    - schema_version
    - pair_schema_version
    - pair_columns
    canonical_pair_schema_version: v2_canonical_pair_csv
datasets:
  nist_sd300b:
    status: active
    unit: unit1
    raw:
      current:
      - data/raw/sd300b/
      - data/raw/sd300b/images/1000/png/
      proposed: data/raw/sd300b/
    processed:
      current:
      - data/processed/nist_sd300b/
      proposed: data/processed/nist_sd300b/
    manifests:
      current:
      - data/manifests/nist_sd300b/manifest.csv
      - data/manifests/nist_sd300b/pairs_neg.csv
      - data/manifests/nist_sd300b/pairs_pos.csv
      - data/manifests/nist_sd300b/pairs_train.csv
      - data/manifests/nist_sd300b/pairs_val.csv
      - data/manifests/nist_sd300b/pairs_test.csv
      - data/manifests/nist_sd300b/pairs_split_build.meta.json
      - data/manifests/nist_sd300b/sanity_report.json
      - data/manifests/nist_sd300b/split.json
      - data/manifests/nist_sd300b/stats.json
      - data/manifests/nist_sd300b/pairs/pairs_train.csv
      - data/manifests/nist_sd300b/pairs/pairs_val.csv
      - data/manifests/nist_sd300b/pairs/pairs_test.csv
      - data/manifests/nist_sd300b/pairs/split_subjects.json
      proposed: data/manifests/nist_sd300b/
    ingest_pipeline:
      current_script: pipelines/ingest/prepare_data_sd300b.py
      support_scripts:
      - pipelines/ingest/generate_pairs.py
      - pipelines/ingest/sanity_check_sd300b.py
      proposed_pipeline: pipelines/ingest/prepare_data_sd300b.py
    notes:
    - Raw data remains under data/raw/sd300b/, while normalized outputs live under
      data/manifests/nist_sd300b/ and data/processed/nist_sd300b/.
    - This dataset has a complete manifest/sanity bundle and benchmark coverage in
      artifacts/reports/benchmark/.
  nist_sd300c:
