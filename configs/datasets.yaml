      - data/manifests/l3_sf_v2/stats.json
      - data/manifests/l3_sf_v2/pairs/pairs_train.csv
      - data/manifests/l3_sf_v2/pairs/pairs_val.csv
      - data/manifests/l3_sf_v2/pairs/pairs_test.csv
      - data/manifests/l3_sf_v2/pairs/split_subjects.json
      - data/manifests/l3_sf_v2/protocol_note.md
      proposed: data/manifests/l3_sf_v2/
    ingest_pipeline:
      current_script: pipelines/ingest/prepare_data_l3_sf_v2.py
      proposed_pipeline: pipelines/ingest/prepare_data_l3_sf_v2.py
    companion_docs:
      current:
      - data/raw/L3_SF_V2/L3SF_V2/L3-SF - Level Three Synthetic Fingerprint Generation.txt
      - data/readme_docs/L3-SF - Level Three Synthetic Fingerprint Generation.txt
      proposed: data/raw/L3_SF_V2/
    notes:
    - The optional ingest pipeline treats each subset as its own synthetic domain and namespaces subject_id by subset to avoid cross-subset leakage.
    - The canonical bundle is verification-only and same-modality; pore annotations are counted for sanity/documentation but not emitted as manifest rows.
    - See data/manifests/l3_sf_v2/protocol_note.md for suitability and protocol caveats.
