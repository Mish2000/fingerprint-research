      - data/manifests/unsw_2d3d/stats.json
      - data/manifests/unsw_2d3d/pairs/pairs_train.csv
      - data/manifests/unsw_2d3d/pairs/pairs_val.csv
      - data/manifests/unsw_2d3d/pairs/pairs_test.csv
      - data/manifests/unsw_2d3d/pairs/split_subjects.json
      - data/manifests/unsw_2d3d/protocol_note.md
      proposed: data/manifests/unsw_2d3d/
    ingest_pipeline:
      current_script: pipelines/ingest/prepare_data_unsw_2d3d.py
      proposed_pipeline: pipelines/ingest/prepare_data_unsw_2d3d.py
    companion_docs:
      current:
      - data/readme_docs/UNSW_2D3D_README.md
      proposed: data/raw/UNSW 3D/
    notes:
    - The optional ingest pipeline keeps optical 2D, reconstructed 3D, post-processed 3D variants, and reconstruction intermediates in the manifest via source_modality.
    - The default canonical bundle uses a cross-modality 2D->3D protocol, but same-modality verification bundles are also supported without forcing a single invalid protocol across all files.
    - See data/manifests/unsw_2d3d/protocol_note.md for suitability and protocol caveats.
  l3_sf_v2:
