      proposed: data/processed/nist_sd300c/
    manifests:
      current:
      - data/manifests/nist_sd300c/manifest.csv
      - data/manifests/nist_sd300c/pairs_neg.csv
      - data/manifests/nist_sd300c/pairs_pos.csv
