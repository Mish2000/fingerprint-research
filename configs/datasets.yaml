      - data/manifests/nist_sd300c/pairs/pairs_test.csv
      - data/manifests/nist_sd300c/pairs/split_subjects.json
      proposed: data/manifests/nist_sd300c/
    ingest_pipeline:
      current_script: pipelines/ingest/prepare_data_sd300c.py
      helper_source: pipelines/ingest/prepare_data_sd300b.py
      proposed_pipeline: pipelines/ingest/prepare_data_sd300c.py
    notes:
    - SD300C now has the same manifest/sanity bundle shape as SD300B under data/manifests/nist_sd300c/.
    - The dedicated SD300C ingest entrypoint is pipelines/ingest/prepare_data_sd300c.py.
  polyu_cross:
    status: active
    unit: unit2
    raw:
      current:
      - data/raw/polyu_cross/
      - data/raw/polyu_cross/contact-based_fingerprints/
      - data/raw/polyu_cross/contactless_2d_fingerprint_images/
      - data/raw/polyu_cross/processed_contactless_2d_fingerprint_images/
      proposed: data/raw/polyu_cross/
    processed:
      current:
      - data/processed/polyu_cross/
      proposed: data/processed/polyu_cross/
    manifests:
      current:
      - data/manifests/polyu_cross/manifest.csv
      - data/manifests/polyu_cross/pairs_neg.csv
      - data/manifests/polyu_cross/pairs_pos.csv
      - data/manifests/polyu_cross/pairs_train.csv
      - data/manifests/polyu_cross/pairs_val.csv
      - data/manifests/polyu_cross/pairs_test.csv
      - data/manifests/polyu_cross/pairs_split_build.meta.json
      - data/manifests/polyu_cross/sanity_report.json
      - data/manifests/polyu_cross/split.json
      - data/manifests/polyu_cross/stats.json
      - data/manifests/polyu_cross/pairs/pairs_train.csv
      - data/manifests/polyu_cross/pairs/pairs_val.csv
      - data/manifests/polyu_cross/pairs/pairs_test.csv
      - data/manifests/polyu_cross/pairs/split_subjects.json
      proposed: data/manifests/polyu_cross/
    ingest_pipeline:
      current_script: pipelines/ingest/prepare_data_polyu_cross.py
      proposed_pipeline: pipelines/ingest/prepare_data_polyu_cross.py
    notes:
    - PolyU Cross is now prepared as a cross-modality benchmark with capture values
      'contactless' and 'contact_based'.
    - The ingest pipeline can auto-select processed contactless images when they exist.
  polyu_3d:
    status: raw_only
    unit: unit2
    raw:
      current:
      - data/raw/3D_Fingerprint_Images_Database_V2/
      - data/raw/3D_Fingerprint_Images_Database_V2/3D_fingerprint_image/
      - data/raw/3D_Fingerprint_Images_Database_V2/3D_surface/
      proposed: data/raw/3D_Fingerprint_Images_Database_V2/
    processed:
      current:
      - data/processed/polyu_3d/
      proposed: data/processed/polyu_3d/
    manifests:
      current:
      - data/manifests/polyu_3d/manifest.csv
      - data/manifests/polyu_3d/pairs_neg.csv
      - data/manifests/polyu_3d/pairs_pos.csv
      - data/manifests/polyu_3d/pairs_train.csv
      - data/manifests/polyu_3d/pairs_val.csv
      - data/manifests/polyu_3d/pairs_test.csv
      - data/manifests/polyu_3d/pairs_split_build.meta.json
      - data/manifests/polyu_3d/sanity_report.json
      - data/manifests/polyu_3d/split.json
      - data/manifests/polyu_3d/stats.json
      - data/manifests/polyu_3d/pairs/pairs_train.csv
      - data/manifests/polyu_3d/pairs/pairs_val.csv
      - data/manifests/polyu_3d/pairs/pairs_test.csv
      - data/manifests/polyu_3d/pairs/split_subjects.json
      - data/manifests/polyu_3d/protocol_note.md
      proposed: data/manifests/polyu_3d/
    ingest_pipeline:
      current_script: pipelines/ingest/prepare_data_polyu_3d.py
      proposed_pipeline: pipelines/ingest/prepare_data_polyu_3d.py
    notes:
    - The optional ingest pipeline is intentionally gated after the active schemas are standardized; it emits the same manifest/sanity bundle shape as the active datasets while keeping this dataset out of the active benchmark path.
    - Manifest rows preserve both contactless raw photometric frames and reconstructed 3D surface files via source_modality, but the default protocol is within-modality only (surface_only).
    - See data/manifests/polyu_3d/protocol_note.md for suitability and protocol caveats.
  unsw_2d3d:
    status: raw_only
    unit: unit2
    raw:
      current:
      - data/raw/UNSW 3D/
      - data/raw/UNSW 3D/2D_Database/2D Database/
      - data/raw/UNSW 3D/DS1/
      - data/raw/UNSW 3D/DS2/
      - data/raw/UNSW 3D/DS3/
      proposed: data/raw/UNSW 3D/
    processed:
      current:
      - data/processed/unsw_2d3d/
      proposed: data/processed/unsw_2d3d/
    manifests:
      current:
      - data/manifests/unsw_2d3d/manifest.csv
      - data/manifests/unsw_2d3d/pairs_neg.csv
      - data/manifests/unsw_2d3d/pairs_pos.csv
      - data/manifests/unsw_2d3d/pairs_train.csv
      - data/manifests/unsw_2d3d/pairs_val.csv
      - data/manifests/unsw_2d3d/pairs_test.csv
